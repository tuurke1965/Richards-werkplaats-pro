<!doctype html>
<html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Richard's Werkplaats Pro</title><link rel="manifest" href="manifest.json"><style>
:root{--g:#0f3d2e;--g2:#17664b;--bg:#f4f7f5;--mut:#65736b}*{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui,sans-serif;background:var(--bg);color:#15211b}header{background:linear-gradient(135deg,var(--g),#061b14);color:#fff;padding:14px;display:flex;gap:14px;align-items:center;position:sticky;top:0;z-index:2}.logo{width:62px;height:62px;object-fit:contain;background:white;border-radius:12px;padding:4px}main{max-width:1150px;margin:auto;padding:16px}.hero,.card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 4px 16px #0001;margin-bottom:12px}.hero{text-align:center}.hero img{max-width:260px;width:70%;border-radius:12px}.tabs{display:flex;gap:8px;overflow:auto;margin:14px 0}button{border:0;border-radius:12px;padding:11px 14px;font-weight:700}.tab{background:white;color:var(--g);border:1px solid #dbe7df;white-space:nowrap}.activeTab,.primary{background:var(--g2)!important;color:white!important}.light{background:#eef5f1;color:var(--g)}.danger{background:#fee2e2;color:#991b1b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.stat{font-size:30px;font-weight:800}.muted{color:var(--mut);font-size:13px}.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}input,select,textarea{width:100%;padding:12px;border:1px solid #cfdad3;border-radius:12px;font-size:16px}label{font-size:13px;font-weight:700}.section{display:none}.section.on{display:block}.order{border-left:8px solid #ddd}.In-aanname{border-left-color:#f59e0b}.In-reparatie{border-left-color:#2563eb}.Wachten-op-onderdelen{border-left-color:#f97316}.Klaar-om-op-te-halen{border-left-color:#16a34a}.Afgeleverd{border-left-color:#6b7280}.old{outline:3px solid #ef4444}.pill{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;background:#eef5f1;color:var(--g);margin:2px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}table{width:100%;border-collapse:collapse}td,th{padding:10px;border-bottom:1px solid #edf2ee;text-align:left}th{background:#eef5f1}.print{display:none}@media print{body>*:not(.print){display:none!important}.print{display:block!important;padding:30px}.print img{max-width:220px}.print td,.print th{border:1px solid #ddd}}
</style></head><body><header><img src="assets/logo.jpg" class="logo"><div><h1>Richard's Werkplaats Pro</h1><div class="muted" style="color:#d8f3e5">Werkplaats • Facturen • Voorraad • Rapportages</div></div></header><main><div class="hero"><img src="assets/logo.jpg"><h2>Werkplaatsdashboard</h2><p class="muted">Werkt lokaal op telefoon, tablet en pc. Later klaar voor cloud.</p></div><div class="tabs"><button class="tab activeTab" onclick="show('dashboard',this)">Dashboard</button><button class="tab" onclick="show('nieuw',this)">Nieuwe aanname</button><button class="tab" onclick="show('werkplaats',this)">Werkplaatsbord</button><button class="tab" onclick="show('klanten',this)">Klanten</button><button class="tab" onclick="show('voorraad',this)">Voorraad</button><button class="tab" onclick="show('rapporten',this)">Rapporten</button></div><section id="dashboard" class="section on"><div id="stats" class="grid"></div><div class="card"><div class="row"><h3>Zoeken</h3><button class="primary" onclick="show('nieuw')">+ Nieuwe fiets</button></div><input id="search" placeholder="Zoek klant, reparatienummer, merk of frame..." oninput="render()"></div><div id="dashOrders"></div></section><section id="nieuw" class="section"><div class="card"><h2>Nieuwe aanname</h2><div class="formgrid"><p><label>Reparatienummer</label><input id="repnr" readonly></p><p><label>Klant</label><input id="klant"></p><p><label>Telefoon</label><input id="tel"></p><p><label>E-mail</label><input id="email"></p><p><label>Merk</label><input id="merk"></p><p><label>Type</label><input id="type"></p><p><label>Kleur</label><input id="kleur"></p><p><label>Framenummer</label><input id="frame"></p><p><label>Status</label><select id="status"><option>In aanname</option><option>In reparatie</option><option>Wachten op onderdelen</option><option>Klaar om op te halen</option><option>Afgeleverd</option></select></p><p><label>Arbeid incl btw</label><input id="arbeid" type="number" step="0.01"></p><p><label>Onderdelen incl btw</label><input id="onderdelen" type="number" step="0.01"></p><p><label>Foto's</label><input id="fotos" type="file" accept="image/*" multiple></p></div><p><label>Werkzaamheden / schade</label><textarea id="werk" rows="4"></textarea></p><button class="primary" onclick="saveOrder()">Opslaan</button></div></section><section id="werkplaats" class="section"><div class="card"><h2>Werkplaatsbord</h2><div id="orderList"></div></div></section><section id="klanten" class="section"><div class="card"><h2>Klanten</h2><div id="customerList"></div></div></section><section id="voorraad" class="section"><div class="card"><h2>Onderdelenvoorraad</h2><div class="formgrid"><input id="partName" placeholder="Onderdeel"><input id="partQty" type="number" placeholder="Aantal"><input id="partPrice" type="number" step="0.01" placeholder="Prijs"></div><br><button class="primary" onclick="addPart()">Onderdeel toevoegen</button><div id="partsList"></div></div></section><section id="rapporten" class="section"><div class="card"><h2>Rapportages</h2><button class="primary" onclick="printReport('dag')">Dagrapport</button> <button class="primary" onclick="printReport('week')">Weekrapport</button> <button class="primary" onclick="printReport('maand')">Maandrapport</button><div id="reportStats"></div></div></section></main><div id="printArea" class="print"></div><script>
const LS='rwp_orders_v2',PS='rwp_parts_v2';let orders=JSON.parse(localStorage.getItem(LS)||'[]'),parts=JSON.parse(localStorage.getItem(PS)||'[]');function euro(n){return '€ '+(+n||0).toFixed(2).replace('.',',')}function nr(){return 'RWP-'+new Date().getFullYear()+'-'+String(orders.length+1).padStart(4,'0')}function days(d){return Math.floor((Date.now()-new Date(d))/86400000)}function cls(s){return s.replaceAll(' ','-')}function show(id,btn){document.querySelectorAll('.section').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('activeTab'));if(btn)btn.classList.add('activeTab');render()}function reset(){['klant','tel','email','merk','type','kleur','frame','arbeid','onderdelen','werk'].forEach(i=>document.getElementById(i).value='');repnr.value=nr();status.value='In aanname'}function saveOrder(){let files=[...fotos.files].slice(0,6),o={id:Date.now(),date:new Date().toISOString(),repnr:repnr.value||nr(),klant:klant.value,tel:tel.value,email:email.value,merk:merk.value,type:type.value,kleur:kleur.value,frame:frame.value,status:status.value,arbeid:+arbeid.value||0,onderdelen:+onderdelen.value||0,werk:werk.value,fotos:[]};if(files.length){let done=0;files.forEach(f=>{let r=new FileReader();r.onload=e=>{o.fotos.push(e.target.result);if(++done===files.length)commit(o)};r.readAsDataURL(f)})}else commit(o)}function commit(o){orders.push(o);localStorage.setItem(LS,JSON.stringify(orders));reset();show('werkplaats')}function card(o){let old=days(o.date)>7&&o.status!='Afgeleverd',imgs=(o.fotos||[]).map(i=>'<img src="'+i+'" style="width:70px;height:70px;object-fit:cover;border-radius:10px;margin:3px">').join('');return `<div class="card order ${cls(o.status)} ${old?'old':''}"><div class="row"><div><b>${o.klant||'Onbekend'}</b> <span class="pill">${o.repnr}</span>${old?'<span class="pill" style="background:#fee2e2;color:#991b1b">staat lang</span>':''}<br><span class="muted">${o.merk||''} ${o.type||''} • ${o.kleur||''} • Frame ${o.frame||'-'}</span></div><b>${euro(o.arbeid+o.onderdelen)}</b></div><p>${o.werk||''}</p><div>${imgs}</div><div class="row"><select onchange="stat(${o.id},this.value)"><option ${o.status=='In aanname'?'selected':''}>In aanname</option><option ${o.status=='In reparatie'?'selected':''}>In reparatie</option><option ${o.status=='Wachten op onderdelen'?'selected':''}>Wachten op onderdelen</option><option ${o.status=='Klaar om op te halen'?'selected':''}>Klaar om op te halen</option><option ${o.status=='Afgeleverd'?'selected':''}>Afgeleverd</option></select><span><button class="light" onclick="work(${o.id})">Werkbon</button> <button class="primary" onclick="invoice(${o.id})">Factuur</button> <button class="danger" onclick="del(${o.id})">X</button></span></div></div>`}function render(){let q=(document.getElementById('search')?.value||'').toLowerCase(),list=orders.filter(o=>JSON.stringify(o).toLowerCase().includes(q)).sort((a,b)=>new Date(b.date)-new Date(a.date));let today=new Date().toDateString(),omzet=orders.filter(o=>new Date(o.date).toDateString()==today).reduce((a,o)=>a+o.arbeid+o.onderdelen,0);stats.innerHTML=`<div class="card"><div class="muted">Actief</div><div class="stat">${orders.filter(o=>o.status!='Afgeleverd').length}</div></div><div class="card"><div class="muted">Klaar</div><div class="stat">${orders.filter(o=>o.status=='Klaar om op te halen').length}</div></div><div class="card"><div class="muted">Wachten</div><div class="stat">${orders.filter(o=>o.status=='Wachten op onderdelen').length}</div></div><div class="card"><div class="muted">Langer dan 7 dagen</div><div class="stat">${orders.filter(o=>o.status!='Afgeleverd'&&days(o.date)>7).length}</div></div><div class="card"><div class="muted">Omzet vandaag</div><div class="stat">${euro(omzet)}</div></div>`;dashOrders.innerHTML=list.slice(0,5).map(card).join('');orderList.innerHTML=list.map(card).join('')||'<p class="muted">Nog geen reparaties.</p>';customerList.innerHTML=[...new Set(orders.map(o=>o.klant).filter(Boolean))].map(n=>`<div class="card"><b>${n}</b><br><span class="muted">${orders.filter(o=>o.klant==n).length} reparaties</span></div>`).join('')||'<p class="muted">Nog geen klanten.</p>';partsList.innerHTML='<table><tr><th>Onderdeel</th><th>Aantal</th><th>Prijs</th><th></th></tr>'+parts.map(p=>`<tr><td>${p.name} ${p.qty<5?'<span class="pill" style="background:#fee2e2;color:#991b1b">laag</span>':''}</td><td>${p.qty}</td><td>${euro(p.price)}</td><td><button class="light" onclick="usePart(${p.id})">Gebruik</button></td></tr>`).join('')+'</table>';reportStats.innerHTML=report('maand')}function stat(id,s){orders.find(o=>o.id==id).status=s;localStorage.setItem(LS,JSON.stringify(orders));render()}function del(id){if(confirm('Verwijderen?')){orders=orders.filter(o=>o.id!=id);localStorage.setItem(LS,JSON.stringify(orders));render()}}function addPart(){parts.push({id:Date.now(),name:partName.value,qty:+partQty.value||0,price:+partPrice.value||0});localStorage.setItem(PS,JSON.stringify(parts));partName.value=partQty.value=partPrice.value='';render()}function usePart(id){let p=parts.find(x=>x.id==id);if(p&&p.qty>0)p.qty--;localStorage.setItem(PS,JSON.stringify(parts));render()}function filt(t){let n=new Date();return orders.filter(o=>{let d=new Date(o.date);if(t=='dag')return d.toDateString()==n.toDateString();if(t=='week')return (n-d)/86400000<7;if(t=='maand')return d.getMonth()==n.getMonth()&&d.getFullYear()==n.getFullYear()})}function report(t){let a=filt(t),ar=a.reduce((x,o)=>x+o.arbeid,0),on=a.reduce((x,o)=>x+o.onderdelen,0);return `<h3>${t}rapport</h3><table><tr><th>Omschrijving</th><th>Bedrag</th></tr><tr><td>Arbeid</td><td>${euro(ar)}</td></tr><tr><td>Onderdelen</td><td>${euro(on)}</td></tr><tr><td><b>Totaal</b></td><td><b>${euro(ar+on)}</b></td></tr><tr><td>Aantal</td><td>${a.length}</td></tr></table>`}function printReport(t){printArea.innerHTML='<img src="assets/logo.jpg">'+report(t);window.print()}function work(id){let o=orders.find(x=>x.id==id);printArea.innerHTML=`<img src="assets/logo.jpg"><h1>Werkbon ${o.repnr}</h1><p><b>Klant:</b> ${o.klant}<br><b>Fiets:</b> ${o.merk} ${o.type}<br><b>Status:</b> ${o.status}</p><p><b>Werk:</b><br>${o.werk||''}</p><p>QR/reparatiecode: ${o.repnr}</p>`;window.print()}function invoice(id){let o=orders.find(x=>x.id==id);printArea.innerHTML=`<img src="assets/logo.jpg"><h1>Factuur ${o.repnr}</h1><p>Richard's Fietsenwerkplaats<br>Charloisse Lagedijk 918, 3088 LA Rotterdam<br>Tel: 010 842 0868</p><p><b>Klant:</b><br>${o.klant}<br>${o.email||''}</p><table><tr><th>Omschrijving</th><th>Bedrag</th></tr><tr><td>Arbeid</td><td>${euro(o.arbeid)}</td></tr><tr><td>Onderdelen</td><td>${euro(o.onderdelen)}</td></tr><tr><td><b>Totaal incl. btw</b></td><td><b>${euro(o.arbeid+o.onderdelen)}</b></td></tr></table>`;window.print()}reset();render();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</function commit(o){
orders.push(o);
localStorage.setItem(LS,JSON.stringify(orders));
reset();
if(document.getElementById('search'))document.getElementById('search').value='';
render();
show('dashboard');
setTimeout(render,100);
}script></body></html>
